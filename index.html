<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planning Horizontal Móvil Avanzado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        #bloqueo-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            color: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        @media screen and (orientation: landscape) {
            #bloqueo-vertical { display: none; }
        }

        .contenedor-app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Lateral de Nombres */
        .lateral-nombres {
            width: 230px;
            height: 100%;
            background: #fff;
            border-right: 2px solid #ccc;
            transition: width 0.3s ease, transform 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 40;
        }
        .lateral-nombres.oculto {
            width: 0;
            border-right: none;
            transform: translateX(-230px);
        }

        .area-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Barra de Herramientas Superior Fija (Garantiza Visibilidad) */
        .barra-herramientas-superior {
            background: #222;
            color: white;
            padding: 6px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 45;
        }
        .btn-accion-top {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 3px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        .btn-accion-top.rojo { background: #dc3545; }

        /* Zona 2: Calendario y Estructura Modular */
        .seccion-calendario {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            background: #fafafa;
            padding: 5px;
            position: relative;
        }

        .fila-linea-reserva {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            width: 100%;
        }

        /* Columna Fija Lateral */
        .columna-fija-mandos {
            width: 140px;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: #e9ecef;
            padding: 4px;
            border-radius: 4px;
            margin-right: 6px;
            border: 1px solid #ccc;
        }
        .columna-fija-mandos input {
            width: 65px;
            font-size: 11px;
            padding: 2px;
            border: 1px solid #ccc;
        }
        .columna-fija-mandos button {
            padding: 2px 4px;
            font-size: 10px;
        }

        /* Caja de Scroll Horizontal Modular */
        .scroll-horizontal-timeline {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            touch-action: pan-x; /* Permite desplazamiento fluido por arrastre con un dedo */
            overscroll-behavior-x: contain; /* Bloquea el efecto rebote/elasticidad nativo */
        }
        
        /* Ocultar barras de scroll visuales para optimizar espacio */
        .scroll-horizontal-timeline::-webkit-scrollbar {
            display: none;
        }

        .wrapper-timeline {
            position: relative;
            width: max-content;
        }

        /* LÍNEA AZUL INTER-CAPAS (Atraviesa todo el layout) */
        .linea-temporal-azul {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0px;
            width: 3px;
            background: #0056b3;
            z-index: 30; /* Elevado para cruzar sobre las pistas de rangos */
            pointer-events: none;
        }
        .control-linea-azul {
            position: absolute;
            top: 32px;
            transform: translateX(-50%);
            background: #0056b3;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            cursor: ew-resize;
            pointer-events: auto;
            white-space: nowrap;
            z-index: 31;
        }

        .contenedor-dias {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 2px;
            background: #eee;
        }
        .dia-celda {
            min-width: 60px;
            width: 60px;
            text-align: center;
            border-right: 1px solid #ccc;
            padding: 4px 0;
            font-size: 11px;
            background: #eee;
        }

        .zona-rangos {
            background: #e2e8f0;
            height: 38px;
            position: relative;
            border-radius: 4px;
            width: 100%;
        }

        .contenedor-nombres-rango {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 0 12px;
            overflow: hidden;
            width: 100%;
            height: 100%;
            align-items: center;
        }
        .tag-nombre-rango {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            border: 1px solid #aaa;
        }

        /* Zona 3: El Plano */
        .seccion-plano {
            height: 38%;
            background: #e9ecef;
            border-top: 3px solid #bbb;
            position: relative;
            transition: height 0.3s ease;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .seccion-plano.oculto { height: 0; border-top: none; overflow: hidden; }
        
        .cabecera-plano {
            background: #ddd;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .canvas-plano {
            flex: 1;
            background: #fff;
            margin: 4px;
            border: 1px dashed #aaa;
            position: relative;
            overflow: hidden;
        }

        .objeto-plano {
            position: absolute;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            padding: 5px;
            box-sizing: border-box;
        }
        .objeto-plano.tipo-piso { background: rgba(0, 123, 255, 0.15); border-color: #007bff; z-index: 1; }
        .objeto-plano.tipo-habitacion { background: rgba(23, 162, 184, 0.25); border-color: #17a2b8; z-index: 2; }
        
        .vertice-resize {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #333;
            right: -5px;
            bottom: -5px;
            cursor: se-resize;
            z-index: 10;
        }

        .header-seccion { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .lista-items { list-style: none; overflow-y: auto; flex: 1; padding: 10px; }
        .item-nombre { display: flex; justify-content: space-between; background: #e2e8f0; padding: 6px; margin-bottom: 5px; border-radius: 4px; cursor: grab; font-size: 13px; }
        .item-nombre input { border: none; background: transparent; font-weight: bold; width: 75%; }
        .tag-plano-dinamico { background: #ffc107; color: #000; padding: 1px 3px; border-radius: 2px; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bloqueo-vertical">
        <h2>🔄 Por favor, gira tu dispositivo</h2>
        <p>Esta aplicación está diseñada para usarse exclusivamente en modo horizontal (Landscape).</p>
    </div>

    <div class="contenedor-app">
        <div class="lateral-nombres oculto" id="panel-izquierdo">
            <div class="header-seccion">
                <span>Lista Nombres</span>
                <button onclick="agregarNombre()">+</button>
            </div>
            <ul class="lista-items" id="lista-nombres"></ul>
        </div>

        <div class="area-principal">
            
            <div class="barra-herramientas-superior">
                <button class="btn-accion-top" id="btn-toggle-nombres" onclick="togglePanel('nombres')">Mostrar Nombres</button>
                <button class="btn-accion-top rojo" id="btn-toggle-plano" onclick="togglePanel('plano')">Ocultar Plano</button>
                <div style="border-left: 1px solid #555; height: 18px; margin: 0 5px;"></div>
                <button class="btn-accion-top" onclick="agregarLinea()">+ Añadir Línea</button>
                <span style="font-size: 11px; color: #ccc;">Zoom: Pellizca con 2 dedos en cualquier parte del calendario</span>
            </div>

            <div class="seccion-calendario" id="seccion-calendario">
                
                <div class="fila-linea-reserva" style="position: relative; z-index: 35;">
                    <div class="columna-fija-mandos" style="background:#ccdad1; font-weight:bold; justify-content:center; font-size:11px;">EJE DIAS</div>
                    <div class="scroll-horizontal-timeline" id="scroll-cabecera" onscroll="sincronizarScrolls(this)">
                        <div class="wrapper-timeline" id="wrapper-cabecera">
                            <div class="linea-temporal-azul" id="linea-azul">
                                <div class="control-linea-azul" id="control-linea">◀ 23 Jul ▶</div>
                            </div>
                            <div class="contenedor-dias" id="calendario-cabecera"></div>
                        </div>
                    </div>
                </div>

                <div id="contenedor-lineas-completo" style="position: relative;"></div>
            </div>

            <div class="seccion-plano" id="panel-plano">
                <div class="cabecera-plano">
                    <strong>Plano de Asignación Espacial</strong>
                    <div>
                        <button id="btn-herramienta-piso" onclick="setHerramienta('piso')" style="padding:2px 6px; font-size:11px;">+ Modo Piso</button>
                        <button id="btn-herramienta-hab" onclick="setHerramienta('habitacion')" style="padding:2px 6px; font-size:11px;">+ Modo Habitación</button>
                    </div>
                </div>
                <div class="canvas-plano" id="lienzo-plano" onmousedown="iniciarDibujo(event)" ontouchstart="iniciarDibujo(event)">
                    <span id="ayuda-plano" style="color:#aaa; position:absolute; top:40%; left:35%; pointer-events: none;">[Trazador de geometrías activo]</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE VISTAS ELECTRÓNICAS ---
        function togglePanel(tipo) {
            if(tipo === 'nombres') {
                const p = document.getElementById('panel-izquierdo');
                const btn = document.getElementById('btn-toggle-nombres');
                const esOculto = p.classList.toggle('oculto');
                btn.innerText = esOculto ? "Mostrar Nombres" : "Ocultar Nombres";
            } else if(tipo === 'plano') {
                const p = document.getElementById('panel-plano');
                const btn = document.getElementById('btn-toggle-plano');
                const esOculto = p.classList.toggle('oculto');
                btn.innerText = esOculto ? "Mostrar Plano" : "Ocultar Plano";
                btn.className = esOculto ? "btn-accion-top" : "btn-accion-top rojo";
            }
            setTimeout(ajustarAltoLineaVerticalAzul, 200);
        }

        // --- 2. GENERACIÓN DE FECHAS LIMITADAS ---
        const cabecera = document.getElementById('calendario-cabecera');
        const diasDelRango = [];
        let fInicio = new Date(2026, 6, 23);
        let fFin = new Date(2026, 7, 31);

        while(fInicio <= fFin) {
            diasDelRango.push(new Date(fInicio));
            fInicio.setDate(fInicio.getDate() + 1);
        }
        diasDelRango.forEach(f => {
            const c = document.createElement('div');
            c.className = 'dia-celda';
            c.innerHTML = `<strong>${f.getDate()}</strong><br>${f.toLocaleString('es-ES', {month: 'short'})}`;
            cabecera.appendChild(c);
        });

        // Vinculación estricta de Scroll Horizontal (Acota y Sincroniza)
        let scrollBloqueado = false;
        function sincronizarScrolls(origen) {
            if (scrollBloqueado) return;
            scrollBloqueado = true;
            
            // Forzar límites de desbordamiento duro
            if (origen.scrollLeft < 0) origen.scrollLeft = 0;
            const maxScroll = origen.scrollWidth - origen.clientWidth;
            if (origen.scrollLeft > maxScroll) origen.scrollLeft = maxScroll;

            const contenedores = document.querySelectorAll('.scroll-horizontal-timeline');
            contenedores.forEach(c => {
                if (c !== origen) c.scrollLeft = origen.scrollLeft;
            });
            scrollBloqueado = false;
        }

        // --- 3. PINCH-TO-ZOOM GLOBAL (Área Completa del Calendario) ---
        let anchoCeldaActual = 70;
        let toqueDistanciaInicial = 0;
        const seccionCalendario = document.getElementById('seccion-calendario');

        seccionCalendario.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                toqueDistanciaInicial = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }, { passive: true });

        seccionCalendario.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && toqueDistanciaInicial > 0) {
                e.preventDefault(); // Detener comportamientos elásticos nativos del navegador
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const delta = dist - toqueDistanciaInicial;
                if(Math.abs(delta) > 4) {
                    cambiarZoom(delta > 0 ? 4 : -4);
                    toqueDistanciaInicial = dist; 
                }
            }
        }, { passive: false });

        function cambiarZoom(v) {
            anchoCeldaActual = Math.max(50, Math.min(160, anchoCeldaActual + v));
            document.querySelectorAll('.dia-celda').forEach(c => {
                c.style.minWidth = `${anchoCeldaActual}px`;
                c.style.width = `${anchoCeldaActual}px`;
            });
            const nuevoAnchoTotal = cabecera.getBoundingClientRect().width;
            document.querySelectorAll('.wrapper-timeline').forEach(w => {
                w.style.width = `${nuevoAnchoTotal}px`;
            });
            actualizarPosicionLineaAzul(porcentajeActualLineaAzul);
            ajustarAltoLineaVerticalAzul();
        }

        // Ajustador para que la línea azul atraviese físicamente todas las filas
        function ajustarAltoLineaVerticalAzul() {
            const contenedorCuerpo = document.getElementById('contenedor-lineas-completo');
            const totalH = cabecera.getBoundingClientRect().height + contenedorCuerpo.getBoundingClientRect().height + 30;
            document.getElementById('linea-azul').style.height = `${totalH}px`;
        }

        // --- 4. GESTIÓN DE LÍNEAS Y NOMBRES ---
        const contenedorLineasCompleto = document.getElementById('contenedor-lineas-completo');
        let baseDatosRangos = {};

        function agregarNombre() {
            const lista = document.getElementById('lista-nombres');
            const id = Date.now();
            const li = document.createElement('li');
            li.className = 'item-nombre';
            li.draggable = true;
            li.id = `nombre-${id}`;
            li.innerHTML = `
                <input type="text" value="Persona ${lista.children.length + 1}" id="input-${id}">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; font-weight:bold;">X</button>
            `;
            li.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', li.id));
            lista.appendChild(li);
        }

        function agregarLinea() {
            const id = Date.now();
            const fila = document.createElement('div');
            fila.className = 'fila-linea-reserva';
            fila.id = `fila-${id}`;
            
            fila.innerHTML = `
                <div class="columna-fija-mandos">
                    <button onclick="moverLinea('${id}', 'subir')">▲</button>
                    <button onclick="moverLinea('${id}', 'bajar')">▼</button>
                    <input type="text" value="Línea ${contenedorLineasCompleto.children.length + 1}">
                    <button onclick="document.getElementById('fila-${id}').remove(); ajustarAltoLineaVerticalAzul();" style="color:red; font-weight:bold;">X</button>
                </div>
                <div class="scroll-horizontal-timeline" id="scroll-linea-${id}" onscroll="sincronizarScrolls(this)">
                    <div class="wrapper-timeline" style="width: ${cabecera.getBoundingClientRect().width}px;">
                        <div class="zona-rangos" id="zona-rangos-${id}" onclick="gestionarClicksRango(event, '${id}')"></div>
                    </div>
                </div>
            `;
            contenedorLineasCompleto.appendChild(fila);
            document.getElementById(`scroll-linea-${id}`).scrollLeft = document.getElementById('scroll-cabecera').scrollLeft;
            ajustarAltoLineaVerticalAzul();
        }

        function moverLinea(id, dir) {
            const el = document.getElementById(`fila-${id}`);
            if (dir === 'subir' && el.previousElementSibling) contenedorLineasCompleto.insertBefore(el, el.previousElementSibling);
            else if (dir === 'bajar' && el.nextElementSibling) contenedorLineasCompleto.insertBefore(el.nextElementSibling, el);
        }

        // --- 5. LÓGICA DE DIBUJO DE RANGOS ---
        let primerClick = null, rangoEditando = null, bordeEditando = null;
        let xInicial = 0, anchoInicial = 0, izquierdaInicial = 0;

        function gestionarClicksRango(event, lineaId) {
            if (event.target.classList.contains('rango-creado') || event.target.classList.contains('control-borde') || event.target.closest('.tag-nombre-rango') || event.target.tagName === 'BUTTON') return;
            const zona = document.getElementById(`zona-rangos-${lineaId}`);
            const rect = zona.getBoundingClientRect();
            const pctClick = ((event.clientX - rect.left) / rect.width) * 100;

            if (primerClick === null || primerClick.lineaId !== lineaId) {
                primerClick = { lineaId: lineaId, porcentaje: pctClick };
                zona.style.background = "#d1e7dd"; 
            } else {
                let inicio = Math.min(primerClick.porcentaje, pctClick);
                let fin = Math.max(primerClick.porcentaje, pctClick);
                let ancho = Math.max(2, fin - inicio);

                if (!comprobarSuperposicion(zona, inicio, ancho)) {
                    dibujarRango(zona, inicio, ancho);
                } else {
                    alert("¡Error! Los rangos no se pueden superponer.");
                }
                zona.style.background = "#e2e8f0";
                primerClick = null;
            }
        }

        function comprobarSuperposicion(zona, nuevoInicio, nuevoAncho, idIgnorar = null) {
            const rangos = zona.querySelectorAll('.rango-creado');
            let solapa = false;
            rangos.forEach(r => {
                if (idIgnorar && r.id === idIgnorar) return;
                let rI = parseFloat(r.style.left), rF = rI + parseFloat(r.style.width);
                if (nuevoInicio < rF && (nuevoInicio + nuevoAncho) > rI) solapa = true;
            });
            return solapa;
        }

        function dibujarRango(zona, inicio, ancho) {
            const rangoId = `rango-${Date.now()}`;
            const rangoEl = document.createElement('div');
            rangoEl.className = 'rango-creado';
            rangoEl.id = rangoId;
            
            baseDatosRangos[rangoId] = { inicio: inicio, fin: inicio + ancho, nombres: [], destinoPlano: null };

            rangoEl.style.cssText = `position:absolute; left:${inicio}%; width:${ancho}%; height:100%; background:#28a745; color:white; display:flex; align-items:center; justify-content:space-between; font-size:10px; border-radius:4px; z-index:5;`;
            rangoEl.innerHTML = `
                <div class="control-borde" onmousedown="iniciarResize(event, '${rangoId}', 'izq')" ontouchstart="iniciarResize(event, '${rangoId}', 'izq')" style="width:12px; height:100%; background:rgba(0,0,0,0.15); cursor:ew-resize;"></div>
                <div class="contenedor-nombres-rango" id="box-nombres-${rangoId}"></div>
                <button onclick="event.stopPropagation(); enviarAPlano('${rangoId}')" style="background:#ffc107; color:black; border:none; padding:1px 3px; font-size:9px; border-radius:2px; font-weight:bold; cursor:pointer; margin-right:2px;">👉 Enviar</button>
                <button onclick="event.stopPropagation(); delete baseDatosRangos['${rangoId}']; this.parentElement.remove();" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer; margin-right:4px;">×</button>
                <div class="control-borde" onmousedown="iniciarResize(event, '${rangoId}', 'der')" ontouchstart="iniciarResize(event, '${rangoId}', 'der')" style="width:12px; height:100%; background:rgba(0,0,0,0.15); cursor:ew-resize;"></div>
            `;

            rangoEl.addEventListener('dragover', (e) => e.preventDefault());
            rangoEl.addEventListener('drop', (e) => {
                e.preventDefault();
                const idNombre = e.dataTransfer.getData('text/plain');
                const valNombre = document.getElementById(idNombre).querySelector('input').value;
                baseDatosRangos[rangoId].nombres.push(valNombre);
                renderizarNombresEnRango(rangoId);
                actualizarPlanoDinamico();
            });

            zona.appendChild(rangoEl);
        }

        function renderizarNombresEnRango(rangoId) {
            const box = document.getElementById(`box-nombres-${rangoId}`);
            box.innerHTML = '';
            baseDatosRangos[rangoId].nombres.forEach((nom, index) => {
                const tag = document.createElement('span');
                tag.className = 'tag-nombre-rango';
                tag.innerHTML = `${nom} <b style="color:red; margin-left:3px; cursor:pointer;" onclick="event.stopPropagation(); eliminarNombreDeRango('${rangoId}', ${index})">x</b>`;
                box.appendChild(tag);
            });
        }

        function eliminarNombreDeRango(rangoId, index) {
            baseDatosRangos[rangoId].nombres.splice(index, 1);
            renderizarNombresEnRango(rangoId);
            actualizarPlanoDinamico();
        }

        function iniciarResize(e, rangoId, borde) {
            e.stopPropagation(); e.preventDefault();
            rangoEditando = document.getElementById(rangoId);
            bordeEditando = borde;
            xInicial = e.touches ? e.touches[0].clientX : e.clientX;
            anchoInicial = parseFloat(rangoEditando.style.width);
            izquierdaInicial = parseFloat(rangoEditando.style.left);

            window.addEventListener('mousemove', moverResize);
            window.addEventListener('mouseup', detenerResize);
            window.addEventListener('touchmove', moverResize, { passive: false });
            window.addEventListener('touchend', detenerResize);
        }

        function moverResize(e) {
            if (!rangoEditando) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const pctDelta = ((cx - xInicial) / rangoEditando.parentElement.getBoundingClientRect().width) * 100;
            let nLeft = izquierdaInicial, nAncho = anchoInicial;

            if (bordeEditando === 'izq') { nLeft += pctDelta; nAncho -= pctDelta; }
            else { nAncho += pctDelta; }

            if (nAncho > 2 && nLeft >= 0 && nLeft + nAncho <= 100 && !comprobarSuperposicion(rangoEditando.parentElement, nLeft, nAncho, rangoEditando.id)) {
                rangoEditando.style.left = `${nLeft}%`;
                rangoEditando.style.width = `${nAncho}%`;
                baseDatosRangos[rangoEditando.id].inicio = nLeft;
                baseDatosRangos[rangoEditando.id].fin = nLeft + nAncho;
            }
        }
        function detenerResize() { rangoEditando = null; }

        // --- 6. CONTROL COHERENTE DE LA LÍNEA AZUL INTER-CAPAS ---
        const ctrlAzul = document.getElementById('control-linea');
        const lineaAzul = document.getElementById('linea-azul');
        const wrapperCabecera = document.getElementById('wrapper-cabecera');
        let dragAzul = false;
        let porcentajeActualLineaAzul = 5;

        ctrlAzul.onmousedown = () => dragAzul = true;
        ctrlAzul.ontouchstart = () => dragAzul = true;
        window.onmouseup = () => { dragAzul = false; resizePlanoObj = false; drawing = false; };
        window.ontouchend = window.onmouseup;

        function calcularYActualizarLinea(clientX) {
            const rectWrapper = wrapperCabecera.getBoundingClientRect();
            let xLocal = clientX - rectWrapper.left;
            xLocal = Math.max(0, Math.min(xLocal, rectWrapper.width));
            porcentajeActualLineaAzul = (xLocal / rectWrapper.width) * 100;
            actualizarPosicionLineaAzul(porcentajeActualLineaAzul);
        }

        function actualizarPosicionLineaAzul(porcentaje) {
            const totalAncho = cabecera.getBoundingClientRect().width;
            let xPixel = (porcentaje / 100) * totalAncho;
            lineaAzul.style.left = `${xPixel}px`;
            
            let indexDia = Math.floor((porcentaje / 100) * diasDelRango.length);
            indexDia = Math.max(0, Math.min(indexDia, diasDelRango.length - 1));
            const fecha = diasDelRango[indexDia];
            ctrlAzul.innerText = `◀ ${fecha.getDate()} ${fecha.toLocaleString('es-ES', {month:'short'})} ▶`;
            actualizarPlanoDinamico();
        }

        window.addEventListener('mousemove', (e) => { if (dragAzul) calcularYActualizarLinea(e.clientX); });
        window.addEventListener('touchmove', (e) => { if (dragAzul && e.touches.length > 0) calcularYActualizarLinea(e.touches[0].clientX); });

        // Arranque inicial calibrado
        setTimeout(() => { cambiarZoom(0); actualizarPosicionLineaAzul(5); }, 200);

        // --- 7. LÓGICA DEL PLANO INTERACTIVO ---
        let herramienta = null, objetosPlano = []; 
        let drawing = false, startX, startY, currentObjId = null, resizePlanoObj = false, planoTargetId = null;

        function setHerramienta(t) {
            herramienta = t;
            document.getElementById('btn-herramienta-piso').className = t === 'piso' ? 'activo' : '';
            document.getElementById('btn-herramienta-hab').className = t === 'habitacion' ? 'activo' : '';
        }

        function iniciarDibujo(e) {
            if (!herramienta) return;
            if (e.target.classList.contains('vertice-resize') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            const rect = document.getElementById('lienzo-plano').getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            startX = cx - rect.left;
            startY = cy - rect.top;
            drawing = true;
            
            currentObjId = `obj-${Date.now()}`;
            const nuevoObj = { id: currentObjId, tipo: herramienta, nombre: herramienta === 'piso' ? 'Nuevo Piso' : 'Habitación', x: startX, y: startY, w: 90, h: 60 };

            if (herramienta === 'piso' && detectarColisionPisos(nuevoObj)) { drawing = false; alert("No puedes superponer pisos."); return; }
            if (herramienta === 'habitacion' && !comprobarHabitacionDentroDePiso(nuevoObj).dentro) { drawing = false; alert("Las habitaciones van dentro de un Piso."); return; }

            objetosPlano.push(nuevoObj);
            renderizarPlano();
            setHerramienta(null);
        }

        function detectarColisionPisos(nuevo, idIgnorar = null) {
            let col = false;
            objetosPlano.forEach(o => {
                if (o.tipo !== 'piso' || o.id === idIgnorar) return;
                if (nuevo.x < o.x + o.w && nuevo.x + nuevo.w > o.x && nuevo.y < o.y + o.h && nuevo.y + nuevo.h > o.y) col = true;
            });
            return col;
        }

        function comprobarHabitacionDentroDePiso(hab) {
            let dentro = false;
            objetosPlano.forEach(p => {
                if (p.tipo !== 'piso') return;
                if (hab.x >= p.x && (hab.x + hab.w) <= (p.x + p.w) && hab.y >= p.y && (hab.y + hab.h) <= (p.y + p.h)) dentro = true;
            });
            return { dentro };
        }

        function renderizarPlano() {
            const lienzo = document.getElementById('lienzo-plano');
            const ayuda = document.getElementById('ayuda-plano');
            if(ayuda) ayuda.style.display = objetosPlano.length === 0 ? 'block' : 'none';
            document.querySelectorAll('.objeto-plano').forEach(el => el.remove());

            objetosPlano.forEach(o => {
                const el = document.createElement('div');
                el.className = `objeto-plano tipo-${o.tipo}`;
                el.id = o.id;
                el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px;`;
                el.innerHTML = `
                    <div class="header-objeto">
                        <input type="text" value="${o.nombre}" onchange="objetosPlano.find(x=>x.id==='${o.id}').nombre=this.value">
                        <button onclick="eliminarObjetoPlano('${o.id}')" style="background:none; border:none; color:red; font-weight:bold;">×</button>
                    </div>
                    <div class="lista-nombres-en-plano" id="dinamico-nombres-${o.id}"></div>
                    <div class="vertice-resize" onmousedown="iniciarResizePlano(event, '${o.id}')" ontouchstart="iniciarResizePlano(event, '${o.id}')"></div>
                `;
                lienzo.appendChild(el);
            });
            actualizarPlanoDinamico();
        }

        function eliminarObjetoPlano(id) { objetosPlano = objetosPlano.filter(o => o.id !== id); renderizarPlano(); }

        function iniciarResizePlano(e, id) {
            e.stopPropagation(); e.preventDefault();
            resizePlanoObj = true; planoTargetId = id;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            startX = cx; startY = cy;
            const obj = objetosPlano.find(o => o.id === id);
            anchoInicial = obj.w; hInicial = obj.h;

            window.addEventListener('mousemove', moverResizePlano);
            window.addEventListener('mouseup', detenerResizePlano);
            window.addEventListener('touchmove', moverResizePlano, {passive:false});
            window.addEventListener('touchend', detenerResizePlano);
        }

        function moverResizePlano(e) {
            if (!resizePlanoObj) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const obj = objetosPlano.find(o => o.id === planoTargetId);
            let nw = Math.max(60, anchoInicial + (cx - startX));
            let nh = Math.max(40, hInicial + (cy - startY));

            if (obj.tipo === 'piso' && detectarColisionPisos({...obj, w: nw, h: nh}, obj.id)) return;
            obj.w = nw; obj.h = nh;
            const dom = document.getElementById(obj.id);
            if(dom) { dom.style.width = `${nw}px`; dom.style.height = `${nh}px`; }
        }

        function detenerResizePlano() {
            if(resizePlanoObj && planoTargetId) {
                const obj = objetosPlano.find(o => o.id === planoTargetId);
                if(obj && obj.tipo === 'habitacion' && !comprobarHabitacionDentroDePiso(obj).dentro) {
                    alert("No puedes redimensionar una habitación fuera de un piso.");
                    eliminarObjetoPlano(obj.id);
                }
            }
            resizePlanoObj = false;
        }

        // --- 8. VINCULACIÓN AL PLANO ---
        function enviarAPlano(rangoId) {
            if(baseDatosRangos[rangoId].nombres.length === 0 || objetosPlano.length === 0) {
                alert("Asegúrate de tener nombres asignados y áreas dibujadas."); return;
            }
            let opciones = objetosPlano.map((o, idx) => `${idx} - ${o.nombre}`).join("\n");
            let eleccion = prompt(`Selecciona el número de área de destino:\n${opciones}`);
            if(eleccion !== null && objetosPlano[parseInt(eleccion)]) {
                baseDatosRangos[rangoId].destinoPlano = objetosPlano[parseInt(eleccion)].id;
                actualizarPlanoDinamico();
            }
        }

        function actualizarPlanoDinamico() {
            objetosPlano.forEach(o => { const b = document.getElementById(`dinamico-nombres-${o.id}`); if(b) b.innerHTML = ''; });
            for(let rId in baseDatosRangos) {
                let r = baseDatosRangos[rId];
                if(porcentajeActualLineaAzul >= r.inicio && porcentajeActualLineaAzul <= r.fin && r.destinoPlano) {
                    const b = document.getElementById(`dinamico-nombres-${r.destinoPlano}`);
                    if(b) {
                        r.nombres.forEach(n => {
                            const s = document.createElement('span'); s.className = 'tag-plano-dinamico'; s.innerText = n; b.appendChild(s);
                        });
                    }
                }
            }
        }
    </script>
</body>
