<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planning Horizontal Flexible Profesional</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        #bloqueo-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            color: white;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        @media screen and (orientation: landscape) {
            #bloqueo-vertical { display: none; }
        }

        .contenedor-app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Lateral de Nombres */
        .lateral-nombres {
            width: 230px;
            min-width: 50px;
            max-width: 50vw;
            height: 100%;
            background: #fff;
            border-right: 4px solid #4a5568;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 40;
            position: relative;
        }
        .lateral-nombres.oculto { width: 0 !important; min-width: 0 !important; border-right: none; }
        
        .lateral-nombres input, .columna-fija-mandos input {
            background: transparent !important;
            border: none;
            outline: none;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            width: 80%;
        }

        /* Área táctil incrementada para el resizer horizontal */
        .resizer-horizontal {
            position: absolute;
            right: -12px;
            top: 0;
            width: 24px;
            height: 100%;
            cursor: ew-resize;
            z-index: 50;
            background: transparent;
        }
        .resizer-horizontal::after {
            content: '';
            position: absolute;
            left: 10px;
            width: 4px;
            height: 100%;
            background: #4a5568;
        }
        .resizer-horizontal:active::after { background: #007bff; }

        .area-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .barra-herramientas-superior {
            background: #222;
            color: white;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 50;
            height: 40px;
        }

        .btn-accion-top {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 3px;
            background: #007bff;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-accion-top.rojo { background: #dc3545; }
        .btn-accion-top.gris { background: #6c757d; }

        /* Calendario */
        .seccion-calendario {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            padding: 5px;
            position: relative;
            overflow: hidden;
        }

        .cabecera-estatica-dias {
            position: relative;
            z-index: 45;
            background: #fafafa;
        }

        .contenedor-lineas-scrollable {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .fila-linea-reserva {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            width: 100%;
        }

        .columna-fija-mandos {
            width: 140px;
            min-width: 140px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            background: #e9ecef;
            padding: 6px;
            border-radius: 4px;
            margin-right: 6px;
            border: 1px solid #ccc;
        }
        .columna-fija-mandos.ocultar-mandos {
            width: 0 !important;
            min-width: 0 !important;
            padding: 0 !important;
            margin-right: 0 !important;
            overflow: hidden;
            border: none !important;
        }

        .btn-borrar-linea {
            background: none;
            border: none;
            color: #dc3545;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
            z-index: 10;
        }

        .scroll-horizontal-timeline {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            touch-action: pan-x;
        }
        .scroll-horizontal-timeline::-webkit-scrollbar { display: none; }

        .wrapper-timeline {
            position: relative;
            width: max-content;
            overflow: visible;
        }

        .linea-temporal-azul {
            position: absolute;
            top: 5px;
            bottom: 5px;
            width: 3px;
            background: #0056b3;
            z-index: 99;
            pointer-events: none;
        }
        .control-linea-azul {
            position: absolute;
            top: 25px;
            transform: translateX(-50%);
            background: #0056b3;
            color: white;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: ew-resize;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            pointer-events: auto;
            white-space: nowrap;
        }

        .guia-pre-rango {
            position: absolute;
            width: 2px;
            border-left: 2px dashed;
            height: 100%;
            top: 0;
            pointer-events: none;
            z-index: 10;
        }

        .contenedor-dias {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 2px;
            background: #eee;
        }
        .dia-celda {
            text-align: center;
            border-right: 1px solid #ccc;
            padding: 4px 0;
            font-size: 10px;
            background: #eee;
            flex-shrink: 0;
        }

        .zona-rangos {
            background: #e2e8f0;
            height: 38px;
            position: relative;
            border-radius: 4px;
        }

        .rango-creado {
            position: absolute;
            height: 100%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            border-radius: 4px;
        }

        .contenedor-nombres-rango {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 0 8px;
            overflow: hidden;
            width: 100%;
            height: 100%;
            align-items: center;
            order: 2;
        }
        .tag-nombre-rango {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            border: 1px solid #aaa;
        }

        /* Plano */
        .seccion-plano {
            height: 240px;
            min-height: 40px;
            max-height: calc(100vh - 100px);
            background: #e9ecef;
            border-top: 4px solid #4a5568;
            position: relative;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: background 0.3s ease;
        }
        .seccion-plano.oculto { height: 0 !important; min-height: 0 !important; border-top: none; overflow: hidden; }
        
        .seccion-plano.modo-vinculacion-activo {
            background: #fff3cd;
            box-shadow: inset 0 0 15px rgba(255, 193, 7, 0.5);
        }

        .resizer-vertical {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            cursor: ns-resize;
            z-index: 110;
            background: transparent;
        }
        .resizer-vertical::after {
            content: '';
            position: absolute;
            top: 8px;
            width: 100%;
            height: 4px;
            background: #4a5568;
        }
        .resizer-vertical:active::after { background: #007bff; }

        .cabecera-plano {
            background: #ddd;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            height: 30px;
            z-index: 10;
        }
        
        .canvas-plano {
            flex: 1;
            background: #fff;
            margin: 4px;
            border: 1px dashed #aaa;
            position: relative;
            overflow: hidden;
        }

        .contenedor-escalable-plano {
            position: absolute;
            width: 2000px;
            height: 2000px;
            top: 0;
            left: 0;
            transform-origin: 0 0;
        }

        .objeto-plano {
            position: absolute;
            border: 2px solid;
            box-sizing: border-box;
            padding: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .objeto-plano.tipo-piso { background: rgba(0, 123, 255, 0.12); border-color: #007bff; z-index: 1; }
        .objeto-plano.tipo-habitacion { background: rgba(23, 162, 184, 0.2); border-color: #17a2b8; z-index: 2; }
        
        .seccion-plano.modo-vinculacion-activo .objeto-plano {
            animation: latidoSutil 1.5s infinite ease-in-out;
        }
        .seccion-plano.modo-vinculacion-activo .objeto-plano.seleccionado-para-vincular {
            background: rgba(40, 167, 69, 0.35) !important;
            border-color: #28a745 !important;
            box-shadow: 0 0 12px #28a745;
            transform: scale(1.02);
            animation: none;
        }

        @keyframes latidoSutil {
            0% { opacity: 0.8; }
            50% { opacity: 1; border-color: #ffc107; }
            100% { opacity: 0.8; }
        }

        .header-objeto { display: flex; justify-content: space-between; align-items: center; font-size: 11px; pointer-events: auto; }
        .header-objeto input { background: transparent; border: none; font-weight: bold; width: 75%; }

        .nodo-resize {
            position: absolute;
            width: 24px;
            height: 24px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }
        .nodo-resize::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border: 1px solid #111;
            border-radius: 2px;
        }
        .nodo-resize:active::after { background: #007bff; transform: scale(1.3); }

        .nodo-n  { top: -12px; left: calc(50% - 12px); cursor: ns-resize; }
        .nodo-s  { bottom: -12px; left: calc(50% - 12px); cursor: ns-resize; }
        .nodo-e  { right: -12px; top: calc(50% - 12px); cursor: ew-resize; }
        .nodo-w  { left: -12px; top: calc(50% - 12px); cursor: ew-resize; }
        .nodo-nw { top: -12px; left: -12px; cursor: nwse-resize; }
        .nodo-ne { top: -12px; right: -12px; cursor: nesw-resize; }
        .nodo-sw { bottom: -12px; left: -12px; cursor: nesw-resize; }
        .nodo-se { bottom: -12px; right: -12px; cursor: nwse-resize; }

        .item-nombre {
            display: flex;
            justify-content: space-between;
            background: #e2e8f0;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: grab;
            font-size: 13px;
            align-items: center;
        }
        .item-nombre:active { opacity: 0.7; border: 1px dashed #007bff; }

        .header-seccion { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .lista-items { list-style: none; overflow-y: auto; flex: 1; padding: 10px; }
        .tag-plano-dinamico { background: #ffc107; color: #000; padding: 1px 3px; border-radius: 2px; font-size: 9px; font-weight: bold; margin-right: 2px; display: inline-block; }

        #banner-vinculacion {
            display: none;
            background: #28a745;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            gap: 8px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="bloqueo-vertical">
        <h2>🔄 Por favor, gira tu dispositivo</h2>
        <p>Esta aplicación está diseñada para usarse exclusivamente en modo horizontal.</p>
    </div>

    <div class="contenedor-app">
        <div class="lateral-nombres" id="panel-izquierdo">
            <div class="header-seccion">
                <span>Lista Nombres</span>
                <button onclick="agregarNombre()">+</button>
            </div>
            <ul class="lista-items" id="lista-nombres"></ul>
            <div class="resizer-horizontal" id="resizer-lateral"></div>
        </div>

        <div class="area-principal">
            <div class="barra-herramientas-superior">
                <button class="btn-accion-top" id="btn-toggle-nombres" onclick="togglePanel('nombres')">Ocultar Nombres</button>
                <button class="btn-accion-top gris" id="btn-toggle-mandos" onclick="toggleMandosLineas()">Ocultar Mandos Líneas</button>
                <button class="btn-accion-top rojo" id="btn-toggle-plano" onclick="togglePanel('plano')">Ocultar Plano</button>
                <div style="border-left: 1px solid #555; height: 18px; margin: 0 4px;"></div>
                <button class="btn-accion-top" onclick="agregarLinea()">+ Añadir Línea</button>
                
                <div id="banner-vinculacion">
                    <span>Modo Vincular Activo: Toca las habitaciones</span>
                    <button onclick="finalizarVinculacionTactil()" style="background:white; color:#28a745; border:none; padding:2px 6px; border-radius:3px; font-weight:bold; cursor:pointer;">Listo ✔</button>
                </div>
            </div>

            <div class="seccion-calendario" id="seccion-calendario">
                
                <div class="linea-temporal-azul" id="linea-azul">
                    <div class="control-linea-azul" id="control-linea">23 Jul</div>
                </div>

                <div class="cabecera-estatica-dias">
                    <div class="fila-linea-reserva">
                        <div class="columna-fija-mandos" id="mando-eje-dias" style="background:#ccdad1; font-weight:bold; justify-content:center; font-size:11px;">EJE DIAS</div>
                        <div class="scroll-horizontal-timeline" id="scroll-cabecera" onscroll="sincronizarScrolls(this)">
                            <div class="wrapper-timeline" id="wrapper-cabecera">
                                <div class="contenedor-dias" id="calendario-cabecera"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contenedor-lineas-scrollable" id="contenedor-scroll-vertical-lineas">
                    <div id="contenedor-lineas-completo"></div>
                </div>
            </div>

            <div class="seccion-plano" id="panel-plano">
                <div class="resizer-vertical" id="resizer-plano"></div>
                <div class="cabecera-plano">
                    <strong id="titulo-plano">Plano Espacial (Pellizcar para Zoom del Plano)</strong>
                    <div>
                        <button id="btn-herramienta-piso" onclick="setHerramienta('piso')" style="padding:2px 6px; font-size:11px;">+ Modo Piso</button>
                        <button id="btn-herramienta-hab" onclick="setHerramienta('habitacion')" style="padding:2px 6px; font-size:11px;">+ Modo Habitación</button>
                    </div>
                </div>
                <div class="canvas-plano" id="lienzo-plano">
                    <div class="contenedor-escalable-plano" id="modulo-escalable-plano" onmousedown="iniciarDibujo(event)" ontouchstart="iniciarDibujo(event)">
                        <span id="ayuda-plano" style="color:#aaa; position:absolute; top:100px; left:200px; pointer-events: none;">[Trazador activo]</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const paletaColores = ['#28a745', '#e67e22', '#9b59b6', '#3498db', '#e74c3c', '#16a085', '#2c3e50', '#f1c40f', '#d35400', '#7f8c8d'];
        let colorIndiceGlobal = 0, mandosOcultados = false;
        let nombreArrastradoTemporal = ""; 

        let rangoEnProcesoDeVinculacion = null;
        let destinosTemporalesSeleccionados = [];

        function togglePanel(tipo) {
            if(tipo === 'nombres') {
                const p = document.getElementById('panel-izquierdo');
                const btn = document.getElementById('btn-toggle-nombres');
                if(p && btn) {
                    const esOculto = p.classList.toggle('oculto');
                    btn.innerText = esOculto ? "Mostrar Nombres" : "Ocultar Nombres";
                }
            } else if(tipo === 'plano') {
                const p = document.getElementById('panel-plano');
                const btn = document.getElementById('btn-toggle-plano');
                if(p && btn) {
                    const esOculto = p.classList.toggle('oculto');
                    btn.innerText = esOculto ? "Mostrar Plano" : "Ocultar Plano";
                    btn.className = esOculto ? "btn-accion-top" : "btn-accion-top rojo";
                }
            }
            setTimeout(actualizarGraficaLineaAzul, 100);
        }

        function toggleMandosLineas() {
            mandosOcultados = !mandosOcultados;
            const btn = document.getElementById('btn-toggle-mandos');
            if(btn) btn.innerText = mandosOcultados ? "Mostrar Mandos Líneas" : "Ocultar Mandos Líneas";
            
            document.querySelectorAll('.columna-fija-mandos').forEach(m => {
                if(mandosOcultados) m.classList.add('ocultar-mandos');
                else m.classList.remove('ocultar-mandos');
            });
            setTimeout(actualizarGraficaLineaAzul, 100);
        }

        // --- CALENDARIO MATEMÁTICO ---
        const cabecera = document.getElementById('calendario-cabecera');
        const scrollCabecera = document.getElementById('scroll-cabecera');
        const diasDelRango = [];
        let fInicio = new Date(2026, 6, 23), fFin = new Date(2026, 7, 31);

        while(fInicio <= fFin) {
            diasDelRango.push(new Date(fInicio));
            fInicio.setDate(fInicio.getDate() + 1);
        }
        if(cabecera) {
            diasDelRango.forEach(f => {
                const c = document.createElement('div');
                c.className = 'dia-celda';
                c.innerHTML = `<strong>${f.getDate()}</strong><br>${f.toLocaleString('es-ES', {month: 'short'})}`;
                cabecera.appendChild(c);
            });
        }

        let scrollBloqueado = false;
        function sincronizarScrolls(origen) {
            if (scrollBloqueado) return;
            scrollBloqueado = true;
            
            document.querySelectorAll('.scroll-horizontal-timeline').forEach(c => {
                if (c !== origen) c.scrollLeft = origen.scrollLeft;
            });
            scrollBloqueado = false;
            actualizarGraficaLineaAzul();
        }

        // --- ZOOM CALENDARIO (PELLIZCO) ---
        let anchoCeldaActual = 50, toqueDistanciaInicial = 0; 
        const seccionCalendario = document.getElementById('seccion-calendario');

        if(seccionCalendario) {
            seccionCalendario.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) toqueDistanciaInicial = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }, { passive: true });

            seccionCalendario.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && toqueDistanciaInicial > 0) {
                    e.preventDefault();
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const delta = dist - toqueDistanciaInicial;
                    if(Math.abs(delta) > 3) { cambiarZoom(delta > 0 ? 3 : -3); toqueDistanciaInicial = dist; }
                }
            }, { passive: false });
        }

        function cambiarZoom(v) {
            anchoCeldaActual = Math.max(20, Math.min(160, anchoCeldaActual + v));
            document.querySelectorAll('.dia-celda').forEach(c => {
                c.style.minWidth = `${anchoCeldaActual}px`;
                c.style.width = `${anchoCeldaActual}px`;
            });
            const nuevoAnchoTotal = diasDelRango.length * anchoCeldaActual;
            document.querySelectorAll('.wrapper-timeline').forEach(w => {
                w.style.width = `${nuevoAnchoTotal}px`;
            });
            recalcularAnchosPixelesRangos();
            actualizarGraficaLineaAzul();
        }

        // --- GESTIÓN DE RANGOS Y LÍNEAS ---
        const contenedorLineasCompleto = document.getElementById('contenedor-lineas-completo');
        let baseDatosRangos = {};

        function agregarNombre() {
            const lista = document.getElementById('lista-nombres');
            if(!lista) return;
            const id = Date.now(), li = document.createElement('li');
            li.className = 'item-nombre'; li.draggable = true; li.id = `nombre-${id}`;
            li.innerHTML = `<input type="text" value="Persona ${lista.children.length + 1}"><button onclick="this.parentElement.remove()" class="btn-borrar-linea">×</button>`;
            
            li.addEventListener('dragstart', (e) => {
                nombreArrastradoTemporal = li.querySelector('input').value;
                e.dataTransfer.setData('text/plain', nombreArrastradoTemporal);
            });
            lista.appendChild(li);

            const input = li.querySelector('input');
            input.focus();
            input.select();
        }

        function agregarLinea() {
            if(!contenedorLineasCompleto || !scrollCabecera) return;
            const id = Date.now(), fila = document.createElement('div');
            fila.className = 'fila-linea-reserva'; fila.id = `fila-${id}`;
            const colorAsignado = paletaColores[colorIndiceGlobal % paletaColores.length];
            colorIndiceGlobal++;
            
            fila.innerHTML = `
                <div class="columna-fija-mandos ${mandosOcultados ? 'ocultar-mandos' : ''}">
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <button onclick="moverLinea('${id}', 'subir')" style="font-size:9px; padding:1px 3px;">▲</button>
                        <button onclick="moverLinea('${id}', 'bajar')" style="font-size:9px; padding:1px 3px;">▼</button>
                    </div>
                    <input type="text" value="Línea ${contenedorLineasCompleto.children.length + 1}">
                    <button onclick="document.getElementById('fila-${id}').remove();" class="btn-borrar-linea">×</button>
                </div>
                <div class="scroll-horizontal-timeline" id="scroll-linea-${id}" onscroll="sincronizarScrolls(this)">
                    <div class="wrapper-timeline" style="width: ${diasDelRango.length * anchoCeldaActual}px;">
                        <div class="zona-rangos" id="zona-rangos-${id}" onclick="gestionarClicksRango(event, '${id}', '${colorAsignado}')"></div>
                    </div>
                </div>
            `;
            contenedorLineasCompleto.appendChild(fila);
            document.getElementById(`scroll-linea-${id}`).scrollLeft = scrollCabecera.scrollLeft;

            const input = fila.querySelector('.columna-fija-mandos input');
            input.focus();
            input.select();
        }

        function moverLinea(id, dir) {
            if(!contenedorLineasCompleto) return;
            const el = document.getElementById(`fila-${id}`);
            if(!el) return;
            if (dir === 'subir' && el.previousElementSibling) contenedorLineasCompleto.insertBefore(el, el.previousElementSibling);
            else if (dir === 'bajar' && el.nextElementSibling) contenedorLineasCompleto.insertBefore(el.nextElementSibling, el);
        }

        let primerClick = null;
        function gestionarClicksRango(event, lineaId, colorHex) {
            if (event.target.classList.contains('rango-creado') || event.target.classList.contains('control-borde') || event.target.closest('.tag-nombre-rango') || event.target.tagName === 'BUTTON') return;
            const zona = document.getElementById(`zona-rangos-${lineaId}`);
            if(!zona) return;
            const rect = zona.getBoundingClientRect();
            const xLocal = event.clientX - rect.left;
            const diaIndex = Math.floor(xLocal / anchoCeldaActual);

            if (primerClick === null || primerClick.lineaId !== lineaId) {
                primerClick = { lineaId: lineaId, diaInicio: diaIndex };
                
                const guia = document.createElement('div');
                guia.className = 'guia-pre-rango';
                guia.id = `guia-linea-${lineaId}`;
                guia.style.left = `${diaIndex * anchoCeldaActual}px`;
                guia.style.borderColor = colorHex;
                zona.appendChild(guia);
            } else {
                let dIn = Math.min(primerClick.diaInicio, diaIndex);
                let dFn = Math.max(primerClick.diaInicio, diaIndex) + 1;

                const gExistente = document.getElementById(`guia-linea-${lineaId}`);
                if(gExistente) gExistente.remove();

                if (!comprobarSuperposicion(lineaId, dIn, dFn)) {
                    dibujarRango(lineaId, dIn, dFn, colorHex);
                } else {
                    alert("Los rangos no se pueden pisar.");
                }
                primerClick = null;
            }
        }

        function comprobarSuperposicion(lineaId, dIn, dFn, idIgnorar = null) {
            let solapa = false;
            for(let rId in baseDatosRangos) {
                let r = baseDatosRangos[rId];
                if(r.lineaId === lineaId && rId !== idIgnorar) {
                    if (dIn < r.diaFin && dFn > r.diaInicio) solapa = true;
                }
            }
            return solapa;
        }

        function dibujarRango(lineaId, diaInicio, diaFin, colorHex) {
            const rangoId = `rango-${Date.now()}`, rangoEl = document.createElement('div');
            rangoEl.className = 'rango-creado'; rangoEl.id = rangoId;
            
            baseDatosRangos[rangoId] = { lineaId: lineaId, diaInicio: diaInicio, diaFin: diaFin, nombres: [], destinosPlano: [], color: colorHex };
            
            rangoEl.innerHTML = `
                <div class="control-borde" onmousedown="iniciarResizeRango(event, '${rangoId}', 'izq')" ontouchstart="iniciarResizeRango(event, '${rangoId}', 'izq')" style="width:16px; height:100%; cursor:ew-resize; background:rgba(0,0,0,0.12); order: 0;"></div>
                <button onclick="event.stopPropagation(); iniciarVinculacionTactil('${rangoId}')" style="background:#ffc107; color:black; border:none; padding:2px 4px; font-size:9px; font-weight:bold; cursor:pointer; margin-right:2px; border-radius:2px; order: 1; flex-shrink: 0;">👉 Vincular</button>
                <div class="contenedor-nombres-rango" id="box-nombres-${rangoId}"></div>
                <button onclick="event.stopPropagation(); delete baseDatosRangos['${rangoId}']; this.parentElement.remove();" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer; margin-right:4px; font-size:14px; order: 3; flex-shrink: 0;">×</button>
                <div class="control-borde" onmousedown="iniciarResizeRango(event, '${rangoId}', 'der')" ontouchstart="iniciarResizeRango(event, '${rangoId}', 'der')" style="width:16px; height:100%; cursor:ew-resize; background:rgba(0,0,0,0.12); order: 4;"></div>
            `;

            rangoEl.addEventListener('dragover', (e) => e.preventDefault());
            rangoEl.addEventListener('drop', (e) => {
                e.preventDefault();
                if(nombreArrastradoTemporal) {
                    baseDatosRangos[rangoId].nombres.push(nombreArrastradoTemporal);
                    renderizarNombresEnRango(rangoId);
                    recalcularDiaPorPosicion();
                    nombreArrastradoTemporal = ""; 
                }
            });

            const zona = document.getElementById(`zona-rangos-${lineaId}`);
            if(zona) zona.appendChild(rangoEl);
            recalcularAnchosPixelesRangos();
        }

        function recalcularAnchosPixelesRangos() {
            for(let rId in baseDatosRangos) {
                let r = baseDatosRangos[rId];
                const dom = document.getElementById(rId);
                if(dom) {
                    dom.style.left = `${r.diaInicio * anchoCeldaActual}px`;
                    dom.style.width = `${(r.diaFin - r.diaInicio) * anchoCeldaActual}px`;
                    dom.style.background = r.color;
                }
            }
        }

        function renderizarNombresEnRango(rangoId) {
            const box = document.getElementById(`box-nombres-${rangoId}`); 
            if(!box) return;
            box.innerHTML = '';
            baseDatosRangos[rangoId].nombres.forEach((nom, idx) => {
                const tag = document.createElement('span'); tag.className = 'tag-nombre-rango';
                tag.innerHTML = `${nom} <b style="color:red; margin-left:4px; cursor:pointer;" onclick="event.stopPropagation(); baseDatosRangos['${rangoId}'].nombres.splice(${idx},1); renderizarNombresEnRango('${rangoId}'); recalcularDiaPorPosicion();">x</b>`;
                box.appendChild(tag);
            });
        }

        // --- MOVIMIENTO RANGOS TIMELINE ---
        let rangoEditando = null, bordeEditando = null, diaInicioBase = 0, diaFinBase = 0, xSujeto = 0;
        function iniciarResizeRango(e, rangoId, borde) {
            e.stopPropagation(); e.preventDefault();
            rangoEditando = rangoId; bordeEditando = borde;
            xSujeto = e.touches ? e.touches[0].clientX : e.clientX;
            diaInicioBase = baseDatosRangos[rangoId].diaInicio;
            diaFinBase = baseDatosRangos[rangoId].diaFin;

            window.addEventListener('mousemove', moverResizeRango);
            window.addEventListener('mouseup', detenerResizeRango);
            window.addEventListener('touchmove', moverResizeRango, { passive: false });
            window.addEventListener('touchend', detenerResizeRango);
        }

        function moverResizeRango(e) {
            if (!rangoEditando) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const despDias = Math.round((cx - xSujeto) / anchoCeldaActual);
            let r = baseDatosRangos[rangoEditando];

            let nIn = r.diaInicio, nFn = r.diaFin;
            if (bordeEditando === 'izq') { nIn = Math.min(diaFinBase - 1, diaInicioBase + despDias); } 
            else { nFn = Math.max(diaInicioBase + 1, diaFinBase + despDias); }

            if (nIn >= 0 && nFn <= diasDelRango.length && !comprobarSuperposicion(r.lineaId, nIn, nFn, rangoEditando)) {
                r.diaInicio = nIn; r.diaFin = nFn; recalcularAnchosPixelesRangos();
            }
        }
        function detenerResizeRango() { rangoEditando = null; }

        // --- ARRASTRE DE LÍNEA AZUL SÍNCRONA ---
        const ctrlAzul = document.getElementById('control-linea'), lineaAzul = document.getElementById('linea-azul');
        const wrapperCabecera = document.getElementById('wrapper-cabecera');
        let dragAzul = false, xInternaPíxelesAzul = 0; 

        if(ctrlAzul) {
            ctrlAzul.onmousedown = () => dragAzul = true;
            ctrlAzul.ontouchstart = () => dragAzul = true;
        }
        
        window.addEventListener('mouseup', () => { dragAzul = false; resizePlanoObj = false; });
        window.addEventListener('touchend', () => { dragAzul = false; resizePlanoObj = false; });

        function calcularYActualizarLineaInterna(clientX) {
            if(!wrapperCabecera) return;
            const rectWrapper = wrapperCabecera.getBoundingClientRect();
            let xCalculada = clientX - rectWrapper.left;
            xInternaPíxelesAzul = Math.max(0, Math.min(xCalculada, rectWrapper.width));
            actualizarGraficaLineaAzul();
        }

        function actualizarGraficaLineaAzul() {
            if(!lineaAzul || !scrollCabecera) return;
            
            const elMando = document.getElementById('mando-eje-dias');
            const rectWrapper = wrapperCabecera ? wrapperCabecera.getBoundingClientRect() : null;
            if(!elMando || !rectWrapper) return; // Control de seguridad anti-errores del DOM

            const rectMandos = elMando.getBoundingClientRect();
            let margenIzquierdoTotal = rectMandos.width + 11; 
            
            let xVisual = (xInternaPíxelesAzul - scrollCabecera.scrollLeft) + margenIzquierdoTotal;
            
            if (xVisual < margenIzquierdoTotal || xVisual > (rectWrapper.width + margenIzquierdoTotal)) {
                lineaAzul.style.opacity = "0";
            } else {
                lineaAzul.style.opacity = "1";
                lineaAzul.style.left = `${xVisual}px`;
            }
            recalcularDiaPorPosicion();
        }

        function recalcularDiaPorPosicion() {
            if(!ctrlAzul) return;
            let maximoIndex = diasDelRango.length - 1;
            let diaIndexCorrespondiente = Math.max(0, Math.min(Math.floor(xInternaPíxelesAzul / anchoCeldaActual), maximoIndex));
            let objetoFecha = diasDelRango[diaIndexCorrespondiente];
            
            if(objetoFecha) {
                ctrlAzul.innerText = `${objetoFecha.getDate()} ${objetoFecha.toLocaleString('es-ES', {month:'short'})}`;
                actualizarPlanoDinamico(diaIndexCorrespondiente);
            }
        }

        window.addEventListener('mousemove', (e) => { if (dragAzul) calcularYActualizarLineaInterna(e.clientX); });
        window.addEventListener('touchmove', (e) => { if (dragAzul && e.touches.length > 0) { e.preventDefault(); calcularYActualizarLineaInterna(e.touches[0].clientX); } }, { passive: false });

        // --- REDIMENSIÓN DE PANELES ---
        const resizerLateral = document.getElementById('resizer-lateral'), panelIzquierdo = document.getElementById('panel-izquierdo');
        if(resizerLateral) {
            resizerLateral.addEventListener('mousedown', (e) => { e.preventDefault(); window.addEventListener('mousemove', resizeH); window.addEventListener('mouseup', stopResizeH); });
            resizerLateral.addEventListener('touchstart', (e) => { window.addEventListener('touchmove', resizeHTouch); window.addEventListener('touchend', stopResizeH); });
        }
        
        function resizeH(e) { 
            if(!panelIzquierdo) return;
            let w = Math.max(50, Math.min(window.innerWidth * 0.5, e.clientX));
            panelIzquierdo.style.width = `${w}px`; 
            actualizarGraficaLineaAzul(); 
        }
        function resizeHTouch(e) { 
            if(e.touches.length > 0 && panelIzquierdo) { 
                let w = Math.max(50, Math.min(window.innerWidth * 0.5, e.touches[0].clientX));
                panelIzquierdo.style.width = `${w}px`; 
                actualizarGraficaLineaAzul(); 
            } 
        }
        function stopResizeH() { window.removeEventListener('mousemove', resizeH); window.removeEventListener('touchmove', resizeHTouch); }

        const resizerPlano = document.getElementById('resizer-plano'), panelPlano = document.getElementById('panel-plano');
        if(resizerPlano) {
            resizerPlano.addEventListener('mousedown', (e) => { e.preventDefault(); window.addEventListener('mousemove', resizeV); window.addEventListener('mouseup', stopResizeV); });
            resizerPlano.addEventListener('touchstart', (e) => { window.addEventListener('touchmove', resizeVTouch); window.addEventListener('touchend', stopResizeV); });
        }
        
        function resizeV(e) { 
            if(!panelPlano) return;
            let targetH = window.innerHeight - e.clientY;
            if(targetH >= 40 && targetH <= (window.innerHeight - 100)) {
                panelPlano.style.height = `${targetH}px`; 
            }
        }
        function resizeVTouch(e) { 
            if(e.touches.length > 0 && panelPlano) {
                let targetH = window.innerHeight - e.touches[0].clientY;
                if(targetH >= 40 && targetH <= (window.innerHeight - 100)) {
                    panelPlano.style.height = `${targetH}px`;
                }
            }
        }
        function stopResizeV() { window.removeEventListener('mousemove', resizeV); window.removeEventListener('touchmove', resizeVTouch); setTimeout(actualizarGraficaLineaAzul, 100); }

        // --- ZOOM PELLIZCO EN PLANO ---
        let escalaPlano = 1.0, distInicialPlano = 0;
        const panelCanvasPlano = document.getElementById('panel-plano');
        const moduloEscalablePlano = document.getElementById('modulo-escalable-plano');

        if(panelCanvasPlano && moduloEscalablePlano) {
            panelCanvasPlano.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) distInicialPlano = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }, { passive: true });

            panelCanvasPlano.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && distInicialPlano > 0) {
                    e.preventDefault();
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const factor = dist / distInicialPlano;
                    escalaPlano = Math.max(0.5, Math.min(2.5, escalaPlano * factor));
                    moduloEscalablePlano.style.transform = `scale(${escalaPlano})`;
                    distInicialPlano = dist;
                }
            }, { passive: false });
        }

        // --- SISTEMA DEL PLANO ---
        let herramienta = null, objetosPlano = [], resizePlanoObj = false, planoTargetId = null, nodoDireccion = null, objOriginalState = {};

        function setHerramienta(t) {
            if(rangoEnProcesoDeVinculacion) return;
            herramienta = t;
            const btnPiso = document.getElementById('btn-herramienta-piso');
            const btnHab = document.getElementById('btn-herramienta-hab');
            if(btnPiso) btnPiso.style.background = t === 'piso' ? '#28a745' : '#007bff';
            if(btnHab) btnHab.style.background = t === 'habitacion' ? '#17a2b8' : '#007bff';
        }

        function iniciarDibujo(e) {
            if (rangoEnProcesoDeVinculacion || !herramienta || !moduloEscalablePlano || e.target.classList.contains('nodo-resize') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            const rect = moduloEscalablePlano.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY;
            
            let xCalculada = (cx - rect.left) / escalaPlano;
            let yCalculada = (cy - rect.top) / escalaPlano;

            const nuevoObj = { id: `obj-${Date.now()}`, tipo: herramienta, nombre: herramienta === 'piso' ? 'Nuevo Piso' : 'Habitación', x: xCalculada - 50, y: yCalculada - 35, w: 120, h: 80 };
            if (herramienta === 'piso' && detectarColisionPisos(nuevoObj)) return alert("No se pueden pisar los pisos.");
            if (herramienta === 'habitacion' && !comprobarHabitacionDentroDePiso(nuevoObj).dentro) return alert("Las habitaciones van dentro de un Piso.");

            objetosPlano.push(nuevoObj); renderizarPlano(); setHerramienta(null);
        }

        function detectarColisionPisos(nuevo, idIgnorar = null) {
            let col = false;
            objetosPlano.forEach(o => {
                if (o.tipo !== 'piso' || o.id === idIgnorar) return;
                if (nuevo.x < o.x + o.w && nuevo.x + nuevo.w > o.x && nuevo.y < o.y + o.h && nuevo.y + nuevo.h > o.y) col = true;
            });
            return col;
        }

        function comprobarHabitacionDentroDePiso(hab) {
            let dentro = false;
            objetosPlano.forEach(p => {
                if (p.tipo !== 'piso') return;
                if (hab.x >= p.x && (hab.x + hab.w) <= (p.x + p.w) && hab.y >= p.y && (hab.y + hab.h) <= (p.y + p.h)) dentro = true;
            });
            return { dentro };
        }

        function renderizarPlano() {
            const ayuda = document.getElementById('ayuda-plano');
            if(ayuda) ayuda.style.display = objetosPlano.length === 0 ? 'block' : 'none';
            
            document.querySelectorAll('.objeto-plano').forEach(el => el.remove());

            if(!moduloEscalablePlano) return;

            objetosPlano.forEach(o => {
                const el = document.createElement('div');
                el.className = `objeto-plano tipo-${o.tipo}`; el.id = o.id;
                el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px;`;
                
                if(rangoEnProcesoDeVinculacion && destinosTemporalesSeleccionados.includes(o.id)) {
                    el.classList.add('seleccionado-para-vincular');
                }

                el.innerHTML = `
                    <div class="header-objeto">
                        <input type="text" value="${o.nombre}" onchange="objetosPlano.find(x=>x.id==='${o.id}').nombre=this.value" ${rangoEnProcesoDeVinculacion ? 'disabled' : ''}>
                        <button onclick="event.stopPropagation(); eliminarObjetoPlano('${o.id}')" style="background:none; border:none; color:red; font-weight:bold; cursor:pointer; ${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}">×</button>
                    </div>
                    <div class="lista-nombres-en-plano" id="dinamico-nombres-${o.id}"></div>
                    
                    <div class="nodo-resize nodo-n"  style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'n')"  ontouchstart="iniciarResizePlano(event, '${o.id}', 'n')"></div>
                    <div class="nodo-resize nodo-s"  style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 's')"  ontouchstart="iniciarResizePlano(event, '${o.id}', 's')"></div>
                    <div class="nodo-resize nodo-e"  style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'e')"  ontouchstart="iniciarResizePlano(event, '${o.id}', 'e')"></div>
                    <div class="nodo-resize nodo-w"  style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'w')"  ontouchstart="iniciarResizePlano(event, '${o.id}', 'w')"></div>
                    <div class="nodo-resize nodo-nw" style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'nw')" ontouchstart="iniciarResizePlano(event, '${o.id}', 'nw')"></div>
                    <div class="nodo-resize nodo-ne" style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'ne')" ontouchstart="iniciarResizePlano(event, '${o.id}', 'ne')"></div>
                    <div class="nodo-resize nodo-sw" style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'sw')" ontouchstart="iniciarResizePlano(event, '${o.id}', 'sw')"></div>
                    <div class="nodo-resize nodo-se" style="${rangoEnProcesoDeVinculacion ? 'display:none;' : ''}" onmousedown="iniciarResizePlano(event, '${o.id}', 'se')" ontouchstart="iniciarResizePlano(event, '${o.id}', 'se')"></div>
                `;

                el.onclick = (e) => {
                    if(rangoEnProcesoDeVinculacion) {
                        e.stopPropagation();
                        gestionarSeleccionObjetoVinculacion(o.id);
                    }
                };

                moduloEscalablePlano.appendChild(el);
            });
            recalcularDiaPorPosicion();
        }

        function eliminarObjetoPlano(id) {
            objetosPlano = objetosPlano.filter(x => x.id !== id);
            for(let rId in baseDatosRangos) {
                if(baseDatosRangos[rId].destinosPlano.includes(id)) {
                    baseDatosRangos[rId].destinosPlano = baseDatosRangos[rId].destinosPlano.filter(x => x !== id);
                }
            }
            renderizarPlano();
        }

        let startX, startY;
        function iniciarResizePlano(e, id, direccion) {
            if(rangoEnProcesoDeVinculacion) return;
            e.stopPropagation(); e.preventDefault();
            resizePlanoObj = true; planoTargetId = id; nodoDireccion = direccion;
            const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY;
            startX = cx; startY = cy;
            const obj = objetosPlano.find(o => o.id === id);
            objOriginalState = { x: obj.x, y: obj.y, w: obj.w, h: obj.h };

            window.addEventListener('mousemove', moverResizePlano);
            window.addEventListener('mouseup', detenerResizePlano);
            window.addEventListener('touchmove', moverResizePlano, {passive:false});
            window.addEventListener('touchend', detenerResizePlano);
        }

        function moverResizePlano(e) {
            if (!resizePlanoObj) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY;
            
            let dx = (cx - startX) / escalaPlano;
            let dy = (cy - startY) / escalaPlano;
            const obj = objetosPlano.find(o => o.id === planoTargetId);
            if(!obj) return;
            
            let nx = objOriginalState.x, ny = objOriginalState.y, nw = objOriginalState.w, nh = objOriginalState.h;
            if (nodoDireccion.includes('e')) nw += dx; if (nodoDireccion.includes('w')) { nx += dx; nw -= dx; }
            if (nodoDireccion.includes('s')) nh += dy; if (nodoDireccion.includes('n')) { ny += dy; nh -= dy; }

            if (nw > 40 && nh > 30 && nx >= 0 && ny >= 0) {
                if (obj.tipo === 'piso' && detectarColisionPisos({x: nx, y: ny, w: nw, h: nh}, obj.id)) return;
                obj.x = nx; obj.y = ny; obj.w = nw; obj.h = nh;
                const dom = document.getElementById(obj.id);
                if(dom) { dom.style.left = `${nx}px`; dom.style.top = `${ny}px`; dom.style.width = `${nw}px`; dom.style.height = `${nh}px`; }
            }
        }

        function detenerResizePlano() {
            if(resizePlanoObj && planoTargetId) {
                const obj = objetosPlano.find(o => o.id === planoTargetId);
                if(obj && obj.tipo === 'habitacion' && !comprobarHabitacionDentroDePiso(obj).dentro) {
                    alert("Las habitaciones deben reajustarse dentro de un piso.");
                    obj.x = objOriginalState.x; obj.y = objOriginalState.y; obj.w = objOriginalState.w; obj.h = objOriginalState.h;
                    renderizarPlano();
                }
            }
            resizePlanoObj = false; window.removeEventListener('mousemove', moverResizePlano); window.removeEventListener('touchmove', moverResizePlano);
        }

        // --- MOTOR DE VINCULACIÓN TÁCTIL ---
        function iniciarVinculacionTactil(rangoId) {
            if(baseDatosRangos[rangoId].nombres.length === 0) return alert("Asigna al menos un nombre al rango antes de vincular.");
            if(objetosPlano.length === 0) return alert("Primero debes dibujar áreas (pisos o habitaciones) en el plano.");

            const panelP = document.getElementById('panel-plano');
            if(panelP && panelP.classList.contains('oculto')) {
                togglePanel('plano');
            }

            rangoEnProcesoDeVinculacion = rangoId;
            destinosTemporalesSeleccionados = [...baseDatosRangos[rangoId].destinosPlano];

            const pPlano = document.getElementById('panel-plano');
            const bVinc = document.getElementById('banner-vinculacion');
            const tPlano = document.getElementById('titulo-plano');
            
            if(pPlano) pPlano.classList.add('modo-vinculacion-activo');
            if(bVinc) bVinc.style.display = 'flex';
            if(tPlano) tPlano.innerText = "¡TOCA LAS ÁREAS DEL PLANO PARA ASOCIARLAS AL RANGO!";

            renderizarPlano();
        }

        function gestionarSeleccionObjetoVinculacion(objId) {
            const index = destinosTemporalesSeleccionados.indexOf(objId);
            if(index > -1) {
                destinosTemporalesSeleccionados.splice(index, 1);
            } else {
                destinosTemporalesSeleccionados.push(objId);
            }
            renderizarPlano();
        }

        function finalizarVinculacionTactil() {
            if(!rangoEnProcesoDeVinculacion) return;

            baseDatosRangos[rangoEnProcesoDeVinculacion].destinosPlano = [...destinosTemporalesSeleccionados];

            const pPlano = document.getElementById('panel-plano');
            const bVinc = document.getElementById('banner-vinculacion');
            const tPlano = document.getElementById('titulo-plano');

            if(pPlano) pPlano.classList.remove('modo-vinculacion-activo');
            if(bVinc) bVinc.style.display = 'none';
            if(tPlano) tPlano.innerText = "Plano Espacial (Pellizcar para Zoom del Plano)";

            rangoEnProcesoDeVinculacion = null;
            destinosTemporalesSeleccionados = [];

            renderizarPlano();
        }

        function actualizarPlanoDinamico(diaIndexFocalizado) {
            objetosPlano.forEach(o => { const b = document.getElementById(`dinamico-nombres-${o.id}`); if(b) b.innerHTML = ''; });
            for(let rId in baseDatosRangos) {
                let r = baseDatosRangos[rId];
                if(diaIndexFocalizado >= r.diaInicio && diaIndexFocalizado < r.diaFin && r.destinosPlano && r.destinosPlano.length > 0) {
                    r.destinosPlano.forEach(destId => {
                        const b = document.getElementById(`dinamico-nombres-${destId}`);
                        if(b) {
                            r.nombres.forEach(n => { 
                                const s = document.createElement('span'); 
                                s.className = 'tag-plano-dinamico'; 
                                s.innerText = n; 
                                b.appendChild(s); 
                            });
                        }
                    });
                }
            }
        }

        window.addEventListener('resize', () => { actualizarGraficaLineaAzul(); });

        setTimeout(() => { 
            cambiarZoom(0); 
            xInternaPíxelesAzul = 0; 
            actualizarGraficaLineaAzul(); 
        }, 300);
    </script>
</body>
</html>
