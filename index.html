<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Planificación Horizontal</title>
    <style>
        /* --- CONFIGURACIÓN DE PANTALLA Y BLOQUEO HORIZONTAL --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        /* Aviso para forzar el modo horizontal */
        #bloqueo-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            color: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Ocultar el aviso solo si está en horizontal */
        @media screen and (orientation: landscape) {
            #bloqueo-vertical {
                display: none;
            }
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        .contenedor-app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Zona 1: Lateral de Nombres */
        .lateral-nombres {
            width: 250px;
            height: 100%;
            background: #fff;
            border-right: 2px solid #ccc;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .lateral-nombres.oculto {
            width: 0;
            border-right: none;
        }

        /* Zona 2 y 3: Contenedor Central y de Plano */
        .area-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Botón flotante para ocultar/mostrar panel izquierdo */
        .btn-toggle-lateral {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 10;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Zona 2: Calendario y Líneas de Tiempo */
        .seccion-calendario {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            background: #fafafa;
            padding: 50px 10px 10px 10px; /* Espacio para el botón flotante */
            position: relative;
        }

        /* El Timeline Slider Azul */
        .linea-temporal-azul {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%; /* Dinámico con JS */
            width: 4px;
            background: #0056b3;
            z-index: 5;
            pointer-events: none;
        }
        .control-linea-azul {
            position: absolute;
            top: 45px;
            transform: translateX(-50%);
            background: #0056b3;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            cursor: ew-resize;
            pointer-events: auto;
        }

        /* Rango de Días (Soporta zoom escalando este contenedor con JS) */
        .contenedor-dias {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 10px;
            transform-origin: left top;
        }
        .dia-celda {
            min-width: 60px;
            text-align: center;
            background: #eee;
            border-right: 1px solid #ccc;
            padding: 5px 0;
            font-size: 11px;
        }

        /* Líneas de Reserva */
        .linea-reserva {
            display: flex;
            align-items: center;
            background: white;
            margin-bottom: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px;
        }
        .controles-linea {
            display: flex;
            gap: 2px;
            margin-right: 10px;
        }
        .controles-linea button {
            padding: 2px 5px;
            font-size: 10px;
        }

        /* Zona 3: El Plano (Inferior) */
        .seccion-plano {
            height: 40%;
            background: #e9ecef;
            border-top: 3px solid #bbb;
            position: relative;
            transition: height 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .seccion-plano.oculto {
            height: 0;
            border-top: none;
            overflow: hidden;
        }
        .cabecera-plano {
            background: #ddd;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .canvas-plano {
            flex: 1;
            background: #fff;
            margin: 5px;
            border: 1px dashed #aaa;
            position: relative;
        }

        /* Utilidades sencillas */
        .header-seccion {
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lista-items {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }
        .item-nombre {
            display: flex;
            justify-content: space-between;
            background: #e2e8f0;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: grab;
        }
        .item-nombre input {
            border: none;
            background: transparent;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="bloqueo-vertical">
        <h2>🔄 Por favor, gira tu dispositivo</h2>
        <p>Esta aplicación está diseñada para usarse exclusivamente en modo horizontal (Landscape).</p>
    </div>

    <div class="contenedor-app">
        
        <div class="lateral-nombres" id="panel-izquierdo">
            <div class="header-seccion">
                <span>Nombres</span>
                <button onclick="agregarNombre()">+</button>
            </div>
            <ul class="lista-items" id="lista-nombres">
                </ul>
        </div>

        <div class="area-principal">
            
            <button class="btn-toggle-lateral" onclick="toggleLateral()">☰ Nombres</button>

            <div class="seccion-calendario">
                
                <div style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center;">
                    <span style="font-size: 12px; font-weight: bold; margin-left: 90px;">Zoom:</span>
                    <button onclick="cambiarZoom(0.1)">+</button>
                    <button onclick="cambiarZoom(-0.1)">-</button>
                    <button onclick="agregarLinea()">+ Añadir Línea</button>
                </div>

                <div class="linea-temporal-azul" id="linea-azul">
                    <div class="control-linea-azul" id="control-linea">◀ 23 Jul ▶</div>
                </div>

                <div class="contenedor-dias" id="calendario-cabecera">
                    </div>

                <div id="contenedor-lineas">
                    </div>
            </div>

            <div class="seccion-plano" id="panel-plano">
                <div class="cabecera-plano">
                    <strong>Plano / Habitaciones</strong>
                    <div>
                        <button onclick="cambiarHerramienta('piso')">+ Dibujar Piso</button>
                        <button onclick="cambiarHerramienta('habitacion')">+ Dibujar Habitación</button>
                        <button onclick="togglePlano()" style="background: #dc3545; color: white; border: none; padding: 2px 6px;">Ocultar Plano</button>
                    </div>
                </div>
                <div class="canvas-plano" id="lienzo-plano">
                    <span style="color: #aaa; position: absolute; top:40%; left:40%; pointer-events: none;">[Área de Dibujo Interactiva]</span>
                </div>
            </div>

            <button id="btn-mostrar-plano" onclick="togglePlano()" style="display:none; position: absolute; bottom: 10px; right: 10px; z-index: 10; padding: 5px 10px;">Mostrar Plano</button>
        </div>
    </div>

    <script>
        // --- 1. GESTIÓN DE VISTAS (OCULTAR/MOSTRAR ZONAS) ---
        function toggleLateral() {
            document.getElementById('panel-izquierdo').classList.toggle('oculto');
        }

        function togglePlano() {
            const plano = document.getElementById('panel-plano');
            const btnMostrar = document.getElementById('btn-mostrar-plano');
            if(plano.classList.contains('oculto')) {
                plano.classList.remove('oculto');
                btnMostrar.style.display = 'none';
            } else {
                plano.classList.add('oculto');
                btnMostrar.style.display = 'block';
            }
        }

        // --- 2. GENERACIÓN DEL CALENDARIO (23 JULIO A 31 AGOSTO) ---
        const cabecera = document.getElementById('calendario-cabecera');
        // El rango abarca Julio (del 23 al 31) y todo Agosto (1 al 31). Total: 40 días.
        const diasDelRango = [];
        
        // Generar array de fechas
        let fechaInicio = new Date(2026, 6, 23); // Mes 6 es Julio en JS
        const fechaFin = new Date(2026, 7, 31);   // Mes 7 es Agosto en JS

        while(fechaInicio <= fechaFin) {
            diasDelRango.push(new Date(fechaInicio));
            fechaInicio.setDate(fechaInicio.getDate() + 1);
        }

        // Renderizar cabecera de días
        diasDelRango.forEach(fecha => {
            const celda = document.createElement('div');
            celda.className = 'dia-celda';
            celda.innerHTML = `<strong>${fecha.getDate()}</strong><br>${fecha.toLocaleString('es-ES', {month: 'short'})}`;
            cabecera.appendChild(celda);
        });

        // --- 3. ZOOM DEL CALENDARIO ---
        let nivelZoom = 1.0;
        function cambiarZoom(valor) {
            nivelZoom += valor;
            if(nivelZoom < 0.6) nivelZoom = 0.6;
            if(nivelZoom > 2.0) nivelZoom = 2.0;
            cabecera.style.transform = `scaleX(${nivelZoom})`;
            // Nota: En una implementación de producción avanzada, escalarías el ancho de las celdas en px 
            // para evitar desalineaciones con las líneas de abajo.
        }

        // --- 4. GESTIÓN DE LA COLUMNA DE NOMBRES (ZONA 1) ---
        function agregarNombre() {
            const lista = document.getElementById('lista-nombres');
            const id = Date.now();
            const li = document.createElement('li');
            li.className = 'item-nombre';
            li.draggable = true;
            li.id = `nombre-${id}`;
            li.innerHTML = `
                <input type="text" value="Persona" id="input-${id}">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; cursor:pointer;">X</button>
            `;
            
            // Eventos para Drag & Drop nativo en móviles/escritorio
            li.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', li.id);
            });
            
            lista.appendChild(li);
        }

        // --- 5. GESTIÓN DE LAS LÍNEAS DE TIEMPO (ZONA 2) ---
        const contenedorLineas = document.getElementById('contenedor-lineas');

        function agregarLinea() {
    const id = Date.now();
    const div = document.createElement('div');
    div.className = 'linea-reserva';
    div.id = `linea-${id}`;
    
    // Estructura de la línea con su zona de tracks para rangos
    div.innerHTML = `
        <div class="controles-linea">
            <button onclick="moverLinea('${id}', 'subir')">▲</button>
            <button onclick="moverLinea('${id}', 'bajar')">▼</button>
            <button onclick="document.getElementById('linea-${id}').remove()" style="color:red; font-weight:bold;">X</button>
        </div>
        <input type="text" value="Línea ${contenedorLineas.children.length + 1}" style="width:90px; margin-right:10px; border:1px solid #ccc; padding:2px;">
        <div class="zona-rangos" id="zona-rangos-${id}" onclick="crearRango(event, '${id}')" 
             style="flex:1; background:#e2e8f0; height:35px; position:relative; border-radius:4px; overflow:hidden;">
        </div>
    `;
    contenedorLineas.appendChild(div);
}

// Función para crear un rango al hacer clic
function crearRango(event, lineaId) {
    // Si hacemos clic en un rango ya creado o en un nombre, no creamos otro encima
    if (event.target.className === 'rango-creado' || event.target.tagName === 'INPUT') return;

    const zona = document.getElementById(`zona-rangos-${lineaId}`);
    const rect = zona.getBoundingClientRect();
    
    // Calcular el porcentaje de clic respecto al ancho total de la línea de tiempo
    const clickX = event.clientX - rect.left;
    const porcentajeClick = (clickX / rect.width) * 100;

    // Definimos un ancho estándar inicial para el rango (ej. 15% del total, aprox. 6 días)
    let anchoRango = 15;
    let posicionIzquierda = porcentajeClick - (anchoRango / 2);
    
    // Forzar límites para que no se salga de los bordes (0% a 100%)
    if (posicionIzquierda < 0) posicionIzquierda = 0;
    if (posicionIzquierda + anchoRango > 100) posicionIzquierda = 100 - anchoRango;

    // --- CONTROL DE SUPERPOSICIÓN ---
    const rangosExistentes = zona.querySelectorAll('.rango-creado');
    let seSuperpone = false;

    rangosExistentes.forEach(rango => {
        const rIzquierda = parseFloat(rango.style.left);
        const rDerecha = rIzquierda + parseFloat(rango.style.width);
        const nuevoDerecha = posicionIzquierda + anchoRango;

        // Fórmula matemática de colisión/solapamiento de rangos
        if (posicionIzquierda < rDerecha && nuevoDerecha > rIzquierda) {
            seSuperpone = true;
        }
    });

    if (seSuperpone) {
        alert("¡Error! No puedes superponer rangos en la misma línea.");
        return;
    }

    // --- CREACIÓN VISUAL DEL RANGO ---
    const rangoId = Date.now();
    const rangoEl = document.createElement('div');
    rangoEl.className = 'rango-creado';
    rangoEl.id = `rango-${rangoId}`;
    
    // Estilos CSS dinámicos para posicionarlo
    rangoEl.style.position = 'absolute';
    rangoEl.style.left = `${posicionIzquierda}%`;
    rangoEl.style.width = `${anchoRango}%`;
    rangoEl.style.height = '100%';
    rangoEl.style.background = '#28a745';
    rangoEl.style.color = 'white';
    rangoEl.style.display = 'flex';
    rangoEl.style.alignItems = 'center';
    rangoEl.style.justifyContent = 'space-between';
    rangoEl.style.padding = '0 5px';
    rangoEl.style.fontSize = '11px';
    rangoEl.style.borderRadius = '4px';

    rangoEl.innerHTML = `
        <span class="nombre-asignado" style="pointer-events:none; font-weight:bold;">Vacío</span>
        <button onclick="event.stopPropagation(); this.parentElement.remove();" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">×</button>
    `;

    // --- SOPORTE DRAG & DROP PARA SOLTAR NOMBRES AQUÍ ---
    rangoEl.addEventListener('dragover', (e) => {
        e.preventDefault(); // Permitir soltar
        rangoEl.style.background = '#218838'; // Feedback visual al pasar por encima
    });

    rangoEl.addEventListener('dragleave', () => {
        rangoEl.style.background = '#28a745';
    });

    rangoEl.addEventListener('drop', (e) => {
        e.preventDefault();
        rangoEl.style.background = '#28a745';
        
        const idNombreElemento = e.dataTransfer.getData('text/plain');
        const inputNombre = document.getElementById(idNombreElemento).querySelector('input');
        
        // Cambiamos el texto del rango por el nombre de la persona arrastrada
        rangoEl.querySelector('.nombre-asignado').innerText = inputNombre.value;
    });

    zona.appendChild(rangoEl);
}

    rangoEl.innerHTML = `

    `;

    });

    rangoEl.addEventListener('dragleave', () => {
        rangoEl.style.background = '#28a745';
    });

    rangoEl.addEventListener('drop', (e) => {
        e.preventDefault();
        rangoEl.style.background = '#28a745';
        
        const idNombreElemento = e.dataTransfer.getData('text/plain');
        const inputNombre = document.getElementById(idNombreElemento).querySelector('input');
        
        // Cambiamos el texto del rango por el nombre de la persona arrastrada
        rangoEl.querySelector('.nombre-asignado').innerText = inputNombre.value;
    });

    zona.appendChild(rangoEl);
}

        // --- 6. CONTROL DESLIZANTE DE LA LÍNEA AZUL ---
        const controlLinea = document.getElementById('control-linea');
        const lineaAzul = document.getElementById('linea-azul');
        let arrastrandoLinea = false;

        controlLinea.addEventListener('mousedown', () => arrastrandoLinea = true);
        window.addEventListener('mouseup', () => arrastrandoLinea = false);
        window.addEventListener('mousemove', (e) => {
            if (!arrastrandoLinea) return;
            // Calcular posición relativa respecto al área de calendario
            const contenedorCal = document.querySelector('.seccion-calendario');
            const rect = contenedorCal.getBoundingClientRect();
            let x = e.clientX - rect.left;
            if(x < 90) x = 90; // Límite izquierdo aproximado de los controles
            if(x > rect.width) x = rect.width;
            
            lineaAzul.style.left = `${x}px`;
            
            // Aquí se calcularía matemáticamente a qué día corresponde 'x' 
            // basándose en el zoom y ancho de las celdas para actualizar el texto.
            controlLinea.innerText = "📅 Día X";
        });

        // Soporte Touch para móviles
        controlLinea.addEventListener('touchstart', () => arrastrandoLinea = true);
        window.addEventListener('touchend', () => arrastrandoLinea = false);
        window.addEventListener('touchmove', (e) => {
            if (!arrastrandoLinea) return;
            const contenedorCal = document.querySelector('.seccion-calendario');
            const rect = contenedorCal.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            if(touchX < 90) touchX = 90;
            lineaAzul.style.left = `${touchX}px`;
        });

        // --- 7. APUNTES PARA ZONA PLANO (HERRAMIENTAS DE DIBUJO) ---
        let herramientaActual = null;
        function cambiarHerramienta(tipo) {
            herramientaActual = tipo;
            alert(`Herramienta seleccionada: ${tipo.toUpperCase()}. Haz clic y arrastra en el lienzo para dibujar (Lógica de vértices modificables a implementar vía HTML5 Canvas).`);
        }
    </script>
</body>
</html>
